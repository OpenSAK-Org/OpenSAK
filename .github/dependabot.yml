version: 2

# PRs land on the beta branch (the primary development branch); they go through CI
# and reach main via a beta -> main PR.

updates:
  - package-ecosystem: pip
    directory: /
    target-branch: beta
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
      include: scope

  - package-ecosystem: github-actions
    directory: /
    target-branch: beta
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    commit-message:
      prefix: ci
      include: scope
